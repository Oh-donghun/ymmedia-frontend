<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>결제 완료 — 와이엠미디어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Pretendard:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root { --ink:#1a1d23; --ink-light:#4a4d53; --ink-mute:#8a8d93; --bg:#fafaf7; --accent:#2a3f5f; --line:#e8e6df; --serif:'Noto Serif KR',serif; --sans:'Pretendard',sans-serif; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--sans); color:var(--ink); background:var(--bg); }
.container { max-width:560px; margin:0 auto; padding:80px 32px; text-align:center; }
.icon { width:64px; height:64px; border:2px solid var(--accent); border-radius:50%; margin:0 auto 32px; display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:32px; }
h1 { font-family:var(--serif); font-size:26px; font-weight:500; margin-bottom:16px; }
p { font-size:15px; color:var(--ink-light); line-height:1.8; margin-bottom:32px; }
.info-box { background:#fff; border:1px solid var(--line); padding:24px; text-align:left; margin-bottom:32px; }
.info-box dl { display:grid; grid-template-columns:auto 1fr; gap:8px 16px; font-size:13px; }
.info-box dt { color:var(--ink-mute); }
.info-box dd { color:var(--ink); word-break:break-all; }
.btn { display:inline-block; padding:12px 32px; background:var(--accent); color:#fff; text-decoration:none; font-size:14px; }
.btn:hover { background:#1a2a4a; }
.small { font-size:12px; color:var(--ink-mute); margin-top:24px; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">✓</div>
  <h1>결제가 완료되었습니다</h1>
  <p>구매해 주셔서 감사합니다.<br>입력하신 휴대전화 번호로 10분 이내 카카오톡 알림톡이 발송됩니다.</p>

  <div class="info-box">
    <dl>
      <dt>주문번호</dt><dd id="orderId">-</dd>
      <dt>결제금액</dt><dd id="amount">-</dd>
      <dt>결제수단</dt><dd id="method">-</dd>
    </dl>
  </div>

  <a href="/" class="btn">메인으로</a>

  <p class="small">결제 관련 문의: 010-2564-7096 · ymmedia40@gmail.com</p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
document.getElementById("orderId").textContent = params.get("orderId") || "-";
const amount = params.get("amount");
document.getElementById("amount").textContent = amount ? "₩" + Number(amount).toLocaleString() : "-";
document.getElementById("method").textContent = params.get("paymentType") || "신용카드";
</script>
</body>
</html>
