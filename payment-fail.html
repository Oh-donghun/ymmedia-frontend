<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>결제 실패 — 와이엠미디어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Pretendard:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root { --ink:#1a1d23; --ink-light:#4a4d53; --ink-mute:#8a8d93; --bg:#fafaf7; --accent:#2a3f5f; --error:#c14545; --line:#e8e6df; --serif:'Noto Serif KR',serif; --sans:'Pretendard',sans-serif; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--sans); color:var(--ink); background:var(--bg); }
.container { max-width:560px; margin:0 auto; padding:80px 32px; text-align:center; }
.icon { width:64px; height:64px; border:2px solid var(--error); border-radius:50%; margin:0 auto 32px; display:flex; align-items:center; justify-content:center; color:var(--error); font-size:32px; }
h1 { font-family:var(--serif); font-size:26px; font-weight:500; margin-bottom:16px; }
p { font-size:15px; color:var(--ink-light); line-height:1.8; margin-bottom:32px; }
.info-box { background:#fff; border:1px solid var(--line); padding:20px; text-align:left; margin-bottom:32px; font-size:13px; }
.info-box .err-code { color:var(--ink-mute); margin-bottom:4px; }
.info-box .err-msg { color:var(--ink); }
.btn { display:inline-block; padding:12px 32px; background:var(--accent); color:#fff; text-decoration:none; font-size:14px; margin:0 4px; }
.btn:hover { background:#1a2a4a; }
.btn-line { background:transparent; color:var(--accent); border:1px solid var(--accent); }
.btn-line:hover { background:var(--accent); color:#fff; }
.small { font-size:12px; color:var(--ink-mute); margin-top:24px; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">!</div>
  <h1>결제가 진행되지 않았습니다</h1>
  <p>결제가 취소되었거나 처리 중 오류가 발생했습니다.<br>다시 시도하시거나, 문제가 지속되면 고객센터로 연락 주세요.</p>

  <div class="info-box">
    <div class="err-code">오류 코드: <span id="code">-</span></div>
    <div class="err-msg">사유: <span id="msg">-</span></div>
  </div>

  <a href="/checkout.html" class="btn">다시 결제하기</a>
  <a href="/" class="btn btn-line">메인으로</a>

  <p class="small">문의: 010-2564-7096 · ymmedia40@gmail.com</p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
document.getElementById("code").textContent = params.get("code") || "UNKNOWN";
document.getElementById("msg").textContent = params.get("message") || "알 수 없는 오류";
</script>
</body>
</html>
